{% extends "base.html" %}
{% block title %}Register – RepoShield{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" style="margin-bottom:10px">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <h1>RepoShield</h1>
      <p>Create your account</p>
    </div>

    <form method="POST">
      <div class="fg">
        <label class="fl">Username</label>
        <input class="fc" type="text" name="username"
               value="{{ username|default('') }}"
               placeholder="johndoe" required minlength="3" autofocus/>
      </div>
      <div class="fg">
        <label class="fl">Email</label>
        <input class="fc" type="email" name="email"
               value="{{ email|default('') }}"
               placeholder="you@example.com" required/>
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <input class="fc" type="password" name="password"
               placeholder="Minimum 8 characters" required minlength="8"/>
      </div>
      <div class="fg">
        <label class="fl">Confirm Password</label>
        <input class="fc" type="password" name="confirm"
               placeholder="••••••••" required/>
      </div>

      <div style="background:rgba(210,153,34,.07);border:1px solid rgba(210,153,34,.2);border-radius:var(--r);padding:11px 13px;margin-bottom:16px;font-size:12px;color:var(--yellow);line-height:1.6">
        ⚠ After registering, an admin must approve your account before you can submit scans.
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;padding:10px;font-size:14px">
        Create Account
      </button>
    </form>

    <div class="auth-foot">
      Already registered? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
